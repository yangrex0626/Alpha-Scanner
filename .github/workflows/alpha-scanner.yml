name: Alpha Scanner Sentinel

on:
  schedule:
    - cron: "*/30 * * * *"   # 每 30 分鐘(GitHub 排程常有數分鐘延遲,屬正常)
  workflow_dispatch:          # 也可在 Actions 頁面手動觸發
    inputs:
      test_telegram:
        description: "勾選=只發一則測試訊息到 Telegram(驗證通知)"
        type: boolean
        default: false

# 同時間只跑一個,避免重疊
concurrency:
  group: alpha-scanner
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      # 還原上一次的候選清單(用來判斷「新標的」)
      - name: Restore state
        uses: actions/cache@v4
        with:
          path: state.json
          key: alpha-state-${{ github.run_id }}
          restore-keys: |
            alpha-state-

      - name: Run scanner
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT: ${{ secrets.TELEGRAM_CHAT }}
          TOP_N: "40"
          MIN_SCORE: "80"
          TEST: ${{ inputs.test_telegram }}
        run: node cloud/scan.mjs
